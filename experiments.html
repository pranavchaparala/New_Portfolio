<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="description" content="Generative coding, motion design, and creative technology experiments by Pranav Chaparala.">

    <!-- Umami Analytics -->

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- STABLE FIXED NAVIGATION BAR -->
    <header>
        <a href="index.html" class="header-block logo-block">pranavchaparala<span>.com</span></a>
        <div class="header-block tagline-block">Designer and Creative Technologist working across different mediums and scales.</div>
        <nav>
            <a href="index.html" class="nav-btn">Projects <span class="count">11</span></a>
            <a href="experiments.html" class="nav-btn active">Experiments <span class="count" id="experiments-count">0</span></a>
            <a href="about.html" class="nav-btn">About</a>
        </nav>
    </header>

    <!-- Section Title -->
    <h1 class="page-title">Experiments <span>|</span> <span id="experiments-count-title">0</span> <span>|</span> Play &amp; Motion</h1>

    <main class="projects-wrapper">
        <div id="experiments-section">
            <!-- Dynamically populated via experiments.js -->
        </div>
    </main>

    <!-- EXPERIMENT MODAL — same structure as case study modal -->
    <div class="modal-overlay" id="experiment-modal">
        <div class="modal-sheet exp-modal-sheet" id="experiment-modal-sheet">

            <!-- Minimap Rail — same as projects, appears on expanded -->
            <div class="modal-right-progress-rail" id="exp-modal-rail">
                <div class="modal-right-viewport-window" id="exp-modal-viewport-indicator"></div>
                <div class="modal-mini-map-blueprint" id="exp-modal-mini-map"></div>
            </div>

            <div class="modal-inner-content-frame">
                <!-- Sticky header bar -->
                <div class="modal-sticky-header">
                    <div class="modal-nav-header-container">
                        <div class="header-block modal-project-title" id="experiment-modal-title">Experiment Title</div>
                        <button class="nav-btn" onclick="closeExperimentModal(event)">Close View</button>
                    </div>
                </div>

                <!-- Content: fits in viewport without scrolling when not expanded -->
                <div class="modal-body-scroller-content exp-modal-body" id="exp-modal-body">
                    <div class="modal-content-container exp-modal-content" id="exp-modal-dynamic-body">

                        <!-- Media fills available space, constrained to viewport -->
                        <div class="exp-modal-media-wrap" id="experiment-media-container">
                            <!-- Injected by JS -->
                        </div>

                        <!-- Metadata panels — same design as projects -->
                        <div class="exp-modal-meta-row" id="exp-modal-meta">
                            <!-- Injected by JS -->
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="projects.js"></script>
    <script src="experiments.js"></script>
    <script>
        function initTaglineMarquee() {
            const el = document.querySelector('.tagline-block');
            if (!el) return;
            const overflow = el.scrollWidth - el.clientWidth;
            if (overflow > 2) {
                el.style.setProperty('--marquee-dist', `-${overflow}px`);
                el.classList.add('overflow-active');
            }
        }
        window.addEventListener('load', initTaglineMarquee);
        window.addEventListener('resize', initTaglineMarquee);
    </script>
</body>
</html>
